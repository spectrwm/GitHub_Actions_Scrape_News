name: Scrape News (Anti-Bot Hybrid)

on:
  schedule:
    - cron: '0 12 * * *'   # daily run
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Checkout repo
      # -----------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------
      # Python setup
      # -----------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # -----------------------------
      # Install dependencies
      # (includes Playwright + tools)
      # -----------------------------
      - name: Install dependencies
        run: |
          pip install feedparser requests beautifulsoup4 trafilatura[lxml] httpx fake-useragent playwright
          playwright install --with-deps

      # -----------------------------
      # Run scraper
      # -----------------------------
      - name: Run scraper
        run: python scrape_rss.py

      # -----------------------------
      # Commit results
      # -----------------------------
      - name: Commit and push results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add news.json
          git commit -m "Update news.json [bot]" || echo "No changes"
          git push
